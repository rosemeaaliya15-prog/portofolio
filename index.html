<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARose</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

/* Background Image */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url("ARR.jpeg") center center/cover no-repeat;
}

/* Blur Layer */

.blur-layer{
    position:fixed;
    inset:0;
    backdrop-filter:blur(18px);
    background:rgba(0,0,0,0.45);
}

/* Title */

.title{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    color:white;
    font-size:70px;
    letter-spacing:10px;
    font-weight:bold;

    text-shadow:
    0 0 10px gold,
    0 0 20px gold,
    0 0 40px gold,
    0 0 80px gold;
}

/* Hearts Container */

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:100;
    pointer-events:none;
}

/* Heart */

.heart{
    position:absolute;
    bottom:-120px;

    color:#ff003c;

    font-size:65px;

    text-shadow:
    0 0 5px #ff003c,
    0 0 10px #ff003c,
    0 0 20px #ff003c,
    0 0 40px #ff003c,
    0 0 80px #ff003c;

    animation:floatUp linear infinite;
}

/* Floating Animation */

@keyframes floatUp{

    0%{
        transform:translateY(0);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-130vh);
        opacity:0;
    }
}

/* Love Text */

.love-text{
    position:fixed;
    bottom:40px;
    left:20px;

    color:#ffb6c1;

    font-size:20px;
    font-weight:bold;
    letter-spacing:2px;

    text-shadow:
    0 0 5px #ffb6c1,
    0 0 10px #ffb6c1,
    0 0 20px #ffb6c1;

    z-index:1000;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="blur-layer"></div>

<div class="hearts">

<div class="heart" style="left:2%;animation-duration:7s;animation-delay:0s;">♡</div>
