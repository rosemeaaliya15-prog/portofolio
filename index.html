<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARose</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

/* Background */

.bg{
    position:fixed;
    inset:0;
    background:url("ARR.jpeg") center center/cover no-repeat;
    animation:bgZoom 12s ease-in-out infinite alternate;
}

@keyframes bgZoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
    }
}

/* Blur Layer */

.blur-layer{
    position:fixed;
    inset:0;
    backdrop-filter:blur(18px);
    background:rgba(0,0,0,0.45);
}

/* Title */

.title{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    color:white;
    font-size:70px;
    letter-spacing:10px;
    font-weight:bold;

    text-shadow:
    0 0 10px gold,
    0 0 20px gold,
    0 0 40px gold,
    0 0 80px gold;
}

/* Hearts */

.hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:100;
}

.heart{
    position:absolute;
    bottom:-120px;
    color:#ff003c;
    font-size:65px;

    text-shadow:
    0 0 5px #ff003c,
    0 0 10px #ff003c,
    0 0 20px #ff003c,
    0 0 40px #ff003c;

    animation:floatUp linear infinite;
}

/* Floating Animation */

@keyframes floatUp{

    0%{
        transform:translateY(0) translateX(0);
        opacity:0;
    }

    15%{
        opacity:1;
    }

    50%{
        transform:translateY(-60vh) translateX(-15px);
    }

    100%{
        transform:translateY(-130vh) translateX(15px);
        opacity:0;
    }
}

/* Love Text */

.love-text{
    position:fixed;
    bottom:40px;
    left:20px;

    color:#ffb6c1;

    font-size:20px;
    font-weight:bold;
    letter-spacing:2px;

    text-shadow:
    0 0 5px #ffb6c1,
    0 0 10px #ffb6c1,
    0 0 20px #ffb6c1;

    z-index:1000;
}

/* MOBILE VIEW */

@media (max-width:768px){

    .title{
        font-size:40px;
        letter-spacing:5px;
    }

    .love-text{
        font-size:14px;
        left:15px;
        bottom:25px;
    }

    .heart{
        width:22px;
        height:22px;
        font-size:0;
        background:#ff4d79;
        transform:rotate(-45deg);

        box-shadow:
        0 0 10px #ff4d79,
        0 0 20px #ff4d79,
        0 0 40px #ff4d79;

        animation:floatUp linear infinite;
    }

    .heart::before,
    .heart::after{
        content:'';
        position:absolute;
        width:22px;
        height:22px;
        background:#ff4d79;
        border-radius:50%;
    }

    .heart::before{
        top:-11px;
        left:0;
    }

    .heart::after{
        top:0;
        left:11px;
    }
}

</style>
</head>

<body>
