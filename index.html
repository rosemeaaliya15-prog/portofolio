<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARose</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Georgia',serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-container{
    width:90%;
    max-width:900px;
    border:3px solid #FFD700;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:
    0 0 15px #FFD700,
    0 0 30px #FFD70033;
}

.title{
    font-size:4rem;
    color:#FFD700;
    letter-spacing:8px;
    margin-bottom:40px;
    text-shadow:
    0 0 10px #FFD700,
    0 0 20px #FFD700;
}

.photo-frame{
    width:320px;
    height:320px;
    margin:auto;
    border:6px solid #FFD700;
    border-radius:20px;
    overflow:hidden;
    box-shadow:
    0 0 20px #FFD700,
    0 0 40px #FFD70055;
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.subtitle{
    margin-top:30px;
    font-size:1.5rem;
    color:#f5d76e;
    letter-spacing:2px;
}

</style>
</head>
<body>

<div class="main-container">

    <h1 class="title">ARose</h1>

    <div class="photo-frame">
        <img src="photo.jpg" alt="ARose">
    </div>

    <div class="subtitle">
        The Most Beautiful Part Of My Life ❤️
    </div>

</div>

</body>
</html>
