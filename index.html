<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hii</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6b81,#ff4757);
    overflow:hidden;
}

h1{
    font-size:100px;
    font-family:Arial,sans-serif;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
    animation:zoom 2s infinite alternate;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}
</style>
</head>
<body>

<h1>Hii ❤️</h1>

</body>
</html>
